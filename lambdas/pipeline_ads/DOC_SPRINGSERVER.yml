  "/api/v1/creatives/bulk_update":
    post:
      summary: Bulk Update
      description: Update multiple creatives with the same attributes in a single
        request.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - "$ref": "#/components/schemas/Status"
              - "$ref": "#/components/schemas/Country"
              - "$ref": "#/components/schemas/Region"
              - "$ref": "#/components/schemas/City"
              - "$ref": "#/components/schemas/PostalCode"
              - "$ref": "#/components/schemas/MetroArea"
              - "$ref": "#/components/schemas/Device"
              - "$ref": "#/components/schemas/OS"
              - "$ref": "#/components/schemas/Browser"
              - "$ref": "#/components/schemas/Brand"
            examples:
              Status:
                value:
                  object_ids:
                  - 1
                  - 2
                  is_active: true
              Country:
                value:
                  object_ids:
                  - 1
                  - 2
                  country_source: values
                  country_codes:
                  - US
                  - CA
                  country_white_list: 'true'
              Region:
                value:
                  object_ids:
                  - 1
                  - 2
                  state_source: values
                  state_codes:
                  - US-AL
                  state_white_list: 'false'
              City:
                value:
                  object_ids:
                  - 1
                  - 2
                  city_source: values
                  city_codes:
                  - 4314295
                  - 2643743
                  city_white_list: 'true'
              PostalCode:
                value:
                  object_ids:
                  - 1
                  - 2
                  postal_code_source: list
                  postal_code_list_ids:
                  - 4
                  - 6
                  postal_code_white_list: 'true'
              Metro Area:
                value:
                  object_ids:
                  - 1
                  - 2
                  metro_area_source: values
                  metro_area_codes:
                  - 2168
                  - 2153
                  metro_area_white_list: 'true'
              Device:
                value:
                  object_ids:
                  - 1
                  - 2
                  all_user_agent_devices: false
                  user_agent_devices:
                  - CTV
              OS:
                value:
                  object_ids:
                  - 1
                  - 2
                  all_user_agent_operating_systems: false
                  user_agent_operating_systems:
                  - iOS
              Browser:
                value:
                  object_ids:
                  - 1
                  - 2
                  all_user_agent_browsers: false
                  user_agent_browsers:
                  - Chrome
                  - Firefox
              Brand:
                value:
                  object_ids:
                  - 1
                  - 2
                  all_user_agent_brand_names: true
        required: true
      responses:
        '200':
          description: Bulk update completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Status message describing the bulk update results
                example:
                  message: 'Successfully updated 2 Creatives: 1, 2'
        '404':
          description: Not found. It indicates that the requested resource or required
            parameter was not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: Object not found
      tags:
      - Creatives
      operationId: creatives_bulk_update_same_attributes_post
