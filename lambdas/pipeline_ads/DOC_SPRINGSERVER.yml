  "/api/v1/accounts/bulk/update":
    post:
      summary: Update Multiple Accounts
      description: Update multiple accounts in a single request. Returns different
        status codes based on success/failure ratio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                allOf:
                - type: object
                  required:
                  - id
            example:
            - id: 1
              name: Updated Name 1
            - id: 2
              name: Updated Name 2
      responses:
        '204':
          description: All updates successful
        '200':
          description: Partial success - some objects updated successfully, others
            failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                example:
                  errors:
                    '1':
                    - Name cannot be blank
                    other:
                    - Object at index 2 is missing an ID
        '400':
          description: Bad request - no objects provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: No objects provided
        '422':
          description: All updates failed - no objects were updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                example:
                  errors:
                    '1':
                    - Name cannot be blank
                    '2':
                    - Rate must be greater than 0
                    other:
                    - Object at index 3 is missing an ID
      tags:
      - Accounts
      operationId: accounts_bulk_update_many_post
