  "/api/v1/audio_creatives":
    get:
      tags:
      - Creatives Audio
      summary: Index
      parameters:
      - "$ref": ref/params.yaml#/components/parameters/pageParam
      - "$ref": ref/params.yaml#/components/parameters/perParam
      - "$ref": ref/params.yaml#/components/parameters/sortParam
      - "$ref": ref/params.yaml#/components/parameters/searchParam
      - "$ref": ref/params.yaml#/components/parameters/filterParams
      - "$ref": ref/params.yaml#/components/parameters/includeParam
      - "$ref": ref/params.yaml#/components/parameters/idsParam
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AudioCreativeIndexResponse"
      operationId: audio_creatives_get
    post:
      tags:
      - Creatives Audio
      summary: Create
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - creative
              - demand_partner_id
              properties:
                creative:
                  type: string
                  format: binary
                  description: Audio file to upload
                demand_partner_id:
                  type: number
                  description: ID of the demand partner (required)
                name:
                  type: string
                  description: Name of the creative (optional)
                is_active:
                  type: boolean
                  default: true
                  description: Whether the creative is active (optional, defaults
                    to true)
          application/json:
            schema:
              "$ref": "#/components/schemas/AudioCreativeCreateData"
            example:
              demand_partner_id: 1
              name: My Audio Creative
              creative_remote_url: https://example.com/audio.mp3
      responses:
        '200':
          description: Successfully created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AudioCreativeResponse"
      operationId: audio_creatives_post
  "/api/v1/auth":
    post:
      summary: Authenticate and get a SpringServe API token
      description: The returned API token should be used as the contents of the HTTP
        `Authorization` header in other authenticated API requests.
      tags:
      - Auth
      security: []
      parameters: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: The token to use in the Authorization header on future
                      requests
                  expiration:
                    type: string
                    description: The expiration timestamp of this token
        '400':
          description: bad request - invalid credentials
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: user@magnite.com
                password:
                  type: string
                  format: password
                  example: some_secret_password
              required:
              - email
              - password
      operationId: auth_post
  "/api/v1/bills":
    get:
      summary: Index
      tags:
      - Bills
      parameters:
      - "$ref": ref/params.yaml#/components/parameters/pageParam
      - "$ref": ref/params.yaml#/components/parameters/perParam
      - "$ref": ref/params.yaml#/components/parameters/sortParam
      - "$ref": ref/params.yaml#/components/parameters/searchParam
      - "$ref": ref/params.yaml#/components/parameters/filterParams
      - "$ref": ref/params.yaml#/components/parameters/includeParam
      - "$ref": ref/params.yaml#/components/parameters/idsParam
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - "$ref": "#/components/schemas/Bill"
      operationId: bills_get
    post:
      summary: Create
      tags:
      - Bills
      requestBody:
        content:
          application/json:
            example:
              name: Bill Name
              is_invoice: 'true'
              is_direct_connect: 'true'
              is_openrtb: 'false'
              is_finalized: 'false'
              currency: USD
              month: '2025-07-01'
            schema:
              type: object
        required: true
      responses:
        '201':
          description: Successfully created a new bill
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Bill"
        '422':
          description: Unprocessable request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  error:
                    type: string
                example:
                  error: Name can't be blank
                  errors:
                    name:
                    - can't be blank
      operationId: bills_post
  "/api/v1/changelogs":
    get:
      summary: Index
      description: List changelogs. Query parameters time (recommended), change_type,
        and user filter results. Available for ClearLine account types.
      parameters:
      - "$ref": ref/params.yaml#/components/parameters/pageParam
      - "$ref": ref/params.yaml#/components/parameters/perParam
      - "$ref": ref/params.yaml#/components/parameters/sortParam
      - "$ref": ref/params.yaml#/components/parameters/searchParam
      - "$ref": ref/params.yaml#/components/parameters/filterParams
      - name: time
        in: query
        schema:
          "$ref": "#/components/schemas/ChangelogsTimeFilter"
      - name: user
        in: query
        description: "Filter by user email, or special keywords: 'Optimization Only',
          'Exclude Optimization', 'SpringCleaning Only', \n'Exclude SpringCleaning',
          'DirectConnect Only', 'Exclude DirectConnect', 'DataMigration Only', 'Exclude
          DataMigration',\n'Exclude System Updates', 'High Volume Users Only' and
          'Exclude High Volume Users'\n"
        schema:
          type: string
      - name: change_type
        in: query
        schema:
          type: string
          enum:
          - created
          - updated
          - deleted
      - "$ref": ref/params.yaml#/components/parameters/includeParam
      - "$ref": ref/params.yaml#/components/parameters/idsParam
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags:
      - Changelogs
      operationId: changelogs_get
  "/api/v1/city_lists":
    get:
      summary: Index
      parameters:
      - "$ref": ref/params.yaml#/components/parameters/pageParam
      - "$ref": ref/params.yaml#/components/parameters/perParam
      - "$ref": ref/params.yaml#/components/parameters/sortParam
      - "$ref": ref/params.yaml#/components/parameters/searchParam
      - "$ref": ref/params.yaml#/components/parameters/filterParams
      - "$ref": ref/params.yaml#/components/parameters/includeParam
      - "$ref": ref/params.yaml#/components/parameters/idsParam
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags:
      - City Lists
      operationId: city_lists_get
    post:
      summary: Create
      requestBody:
        content:
          application/json:
            schema:
              allOf:
              - "$ref": "#/components/schemas/CityListCreateRequest"
              - type: object
                properties:
                  city_codes:
                    type: array
                    items:
                      type: number
                    example:
                    - 2988507
                    - 2643743
                required:
                - city_codes
          multipart/form-data:
            schema:
              allOf:
              - "$ref": "#/components/schemas/CityListCreateRequest"
              - type: object
                properties:
                  csv_file:
                    type: string
                    format: binary
                required:
                - csv_file
      responses:
        '201':
          description: Successfully created City List
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CityListResponse"
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      tags:
      - City Lists
      operationId: city_lists_post
  "/api/v1/country_lists":
    get:
      summary: Index
      parameters:
      - "$ref": ref/params.yaml#/components/parameters/pageParam
      - "$ref": ref/params.yaml#/components/parameters/perParam
      - "$ref": ref/params.yaml#/components/parameters/sortParam
      - "$ref": ref/params.yaml#/components/parameters/searchParam
      - "$ref": ref/params.yaml#/components/parameters/filterParams
      - "$ref": ref/params.yaml#/components/parameters/includeParam
      - "$ref": ref/params.yaml#/components/parameters/idsParam
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags:
      - Country Lists
      operationId: country_lists_get
    post:
      summary: Create
      requestBody:
        content:
          application/json:
            schema:
              allOf:
              - "$ref": "#/components/schemas/CountryListCreateRequest"
              - type: object
                properties:
                  country_codes:
                    type: array
                    items:
                      type: string
                    example:
                    - AL
                    - AD
                required:
                - country_codes
