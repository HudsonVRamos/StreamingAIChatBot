openapi: 3.0.1
info:
  title: SpringServe UI API
  version: 1.0.0
  description: "> **_NOTE:_** This document covers the v1 API (`/api/v1`).  You can
    find documentation on the v0 API (`/api/v0`) on the [Magnite Help Center](https://help.magnite.com/),
    which is broken into \nsections for endpoints relevant to [SpringServe](https://help.magnite.com/help/api-documentation)
    and [Clearline](https://help.magnite.com/help/api-documentation-06dd4d3).\n\n#
    Authentication\nWhen using this API documentation server, by default it will authenticate
    API calls using cookie-based authentication agains the selected server.  If you
    are properly logged into the SpringServe server and your session is still active,
    then the API calls should automatically authenticate.  \n\nOutside of this API
    documentation server you should use either Token Based or Bearer authentication.
    \ You may also these authentication methods on this server as well,\n which will
    take precedence over any cookie/session based authentication.\n### Token Based
    Authentication\nUse the [POST /api/v1/auth](#/Auth/auth_post) endpoint to generate
    an API token that is then passed in the `Authorization: <token>` header\n\n###
    Bearer Authentication\nUse the [POST /api/v1/auth](#/Auth/auth_post) endpoint
    to authenticate and get a bearer token that is then passed in the `Authorization:
    Bearer <token>` header\n\n# Active Account Context\nA given request always runs
    in the context of currently active account for the authenticated user making the
    request.  The active account can be determined via\nthe [GET /api/v1/accounts/current](#/Accounts/accounts_current_get)
    endpoint and updated via [POST /api/v1/accounts/{id}/set_current](#/Accounts/accounts_id_set_current_post).\n\n#
    Common List Resource Functionality\n\n## List Resource Requests\nVirtually all
    List endpoints (e.g. `GET /api/v1/demand_tags`) support the following via request
    query parameters:\n* Pagination via the `page` (first page is page `1`) and `per`
    (how many results per page, default is `50`, max is `1000`) query parameters.\n*
    Searching via the `search` query param\n* Sorting via the comma-delimitted `sort`
    query param - e.g. `sort=name,-id` would sort by name ascending, then by id descending.
    \ By default,\nonly first-level (directly on the entity, not on assications) attributes
    are sortable.  Some endpoints expose additional/custom orderable fields, \nwhich
    are documented with that endpoint.\n* Filtering via the query param `<attribute>=<value>`
    e.g. `id=3` for every first-level (not on associations) attribute on the entity.
    \ Some\n  endpoints expose additional filters which are called out in the documentation
    for that endpoint.  You can also add an optional operator to the filter via the
    format `<attribute>::<operator>=<value>`, \n  e.g. `id::gt=3` to filter for ids
    greater than 3 or `updated_at::lte=2025-01-01` to filter for updated_at less than
    or equal to 2025-01-01.  \n  The following operators are supported:\n  * `::gt`
    - greater than\n  * `::gte` - greater than or equal to\n  * `::lt` - less than\n
    \ * `::lte` - less than or equal to\n  * `::in` - in the comma-delimitted list
    of values\n* Inclusion of associated resources via the comma-delimitted `includes`
    attribute. The common List Result body has `includable_fields` metadata\n  that
    tells you which associations are includable.  If not specified, a logical default
    set of associations are included.  You may pass\n  `includes=` as a blank entry
    to not include any associations, which can speed up API results if the associated
    data is not needed.\n* Inclusion of additional data (e.g. quickstats) via the
    `additional_data` query param.  Possible values come from the `additional_data_fields`\narray
    on a list response.\n\n## List Resource Responses\nVirtually all List endoints
    have the same result format:\n* `count` - how many results are in this response\n*
    `total_count` - how many results are their across all pages of results\n* `current_page`
    - the current page of results (first page is `1`)\n* `total_pages` - how many
    total pages of results there are\n* `includable_fields` - assocations of the current
    resource that `can` be included in the result via the `include` query param.  Note:
    this is not necessarily what is included\nin the current result, but rather what
    is possible to request.\n* `additional_data_fields` - additional data, beyond
    normal associations, that can be included on the result (e.g. quickstats) via
    the `additional_data` query param.\n* `results` - The array of resource results
    \ \n\n# Common Show Resource Functionality\nMost endpoints to retrieve a single
    resource, e.g. `GET /api/v1/demand_tags` allow to include associated resources
    on the result via the same `includes` query\nparamater as the List requests.  See
    the List response the resource for which associations are includable.\n"
